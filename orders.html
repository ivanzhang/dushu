    <header class="topbar">
      <div class="container topbar-inner">
        <a class="brand" href="./index.html">
          <span class="brand-badge">墨</span>
          <span>墨潮小说</span>
        </a>
        <button class="nav-toggle" type="button" aria-label="打开菜单">☰</button>
        <nav>
          <ul class="nav-list">
            <li><a class="nav-link" data-page="home" href="./index.html">首页</a></li>
            <li><a class="nav-link" data-page="category" href="./category.html">分类</a></li>
            <li><a class="nav-link" data-page="book" href="./book.html">书籍详情</a></li>
            <li><a class="nav-link" data-page="reader" href="./reader.html">在线阅读</a></li>
            <li><a class="nav-link" data-page="bookshelf" href="./bookshelf.html">我的书架</a></li>
            <li><a class="nav-link" data-page="subscription" href="./subscription.html">订阅</a></li>
            <li><a class="nav-link" data-page="orders" href="./orders.html">订单</a></li>
            <li><a class="nav-link" data-page="login" href="./login.html">登录</a></li>
          </ul>
        </nav>
      </div>
    </header>

    <main class="container">
      <section class="section">
        <div class="section-head">
          <div>
            <h1 class="section-title">订单记录</h1>
            <p class="section-sub">展示本地模拟订单数据，后续可替换真实订单 API。</p>
          </div>
          <a class="btn btn-secondary" href="./subscription.html">去订阅</a>
        </div>
      </section>

      <section class="section" style="padding-top:0;">
        <div id="orders-summary" class="orders-summary"></div>
      </section>

      <section class="section" style="padding-top:0;">
        <div class="panel panel-body orders-table-wrap reveal">
          <table class="orders-table">
            <thead>
              <tr>
                <th>订单号</th>
                <th>套餐</th>
                <th>金额</th>
                <th>支付方式</th>
                <th>时间</th>
                <th>状态</th>
              </tr>
            </thead>
            <tbody id="orders-body"></tbody>
          </table>
        </div>
      </section>
    </main>

    <footer>
      <div class="container">订单页模板支持分页、筛选、发票下载与退款记录扩展。</div>
    </footer>

    <script src="./assets/mock-data.js"></script>
    <script src="./assets/main.js"></script>
