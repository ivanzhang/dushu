<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>墨潮小说 - 分类</title>
    <link rel="stylesheet" href="./assets/styles.css" />
  </head>
  <body data-page="category">
    <header class="topbar">
      <div class="container topbar-inner">
        <a class="brand" href="./index.html">
          <span class="brand-badge">墨</span>
          <span>墨潮小说</span>
        </a>
        <button class="nav-toggle" type="button" aria-label="打开菜单">☰</button>
        <nav>
          <ul class="nav-list">
            <li><a class="nav-link" data-page="home" href="./index.html">首页</a></li>
            <li><a class="nav-link" data-page="category" href="./category.html">分类</a></li>
            <li><a class="nav-link" data-page="book" href="./book.html">书籍详情</a></li>
            <li><a class="nav-link" data-page="reader" href="./reader.html">在线阅读</a></li>
            <li><a class="nav-link" data-page="bookshelf" href="./bookshelf.html">我的书架</a></li>
            <li><a class="nav-link" data-page="login" href="./login.html">登录</a></li>
          </ul>
        </nav>
      </div>
    </header>

    <main class="container">
      <section class="section">
        <div class="panel reveal">
          <div class="panel-head">
            <strong>作品筛选</strong>
            <small style="color: var(--ink-500)">纯前端筛选演示</small>
          </div>
          <div class="panel-body" style="display:grid; gap:14px;">
            <div class="filter-grid">
              <strong>题材</strong>
              <div class="chip-row">
                <button class="chip active" data-filter="全部" type="button">全部</button>
                <button class="chip" data-filter="悬疑" type="button">悬疑</button>
                <button class="chip" data-filter="古风" type="button">古风</button>
                <button class="chip" data-filter="科幻" type="button">科幻</button>
                <button class="chip" data-filter="武侠" type="button">武侠</button>
                <button class="chip" data-filter="言情" type="button">言情</button>
                <button class="chip" data-filter="奇幻" type="button">奇幻</button>
              </div>
            </div>
            <div class="filter-grid">
              <strong>字数</strong>
              <div class="chip-row">
                <span class="chip">20 万以下</span>
                <span class="chip">20-50 万</span>
                <span class="chip">50-100 万</span>
                <span class="chip">100 万以上</span>
              </div>
            </div>
            <div class="filter-grid">
              <strong>状态</strong>
              <div class="chip-row">
                <span class="chip">连载中</span>
                <span class="chip">已完结</span>
              </div>
            </div>
          </div>
        </div>
      </section>

      <section class="section">
        <div class="section-head">
          <div>
            <h1 class="section-title">分类书库</h1>
            <p class="section-sub">当前按热度排序，可替换为后端分页与检索接口。</p>
          </div>
          <a class="btn btn-secondary" href="./index.html">返回首页</a>
        </div>
        <div id="category-grid" class="grid"></div>
      </section>
    </main>

    <footer>
      <div class="container">分类页模板支持筛选区、结果区、排序区扩展。</div>
    </footer>

    <script src="./assets/mock-data.js"></script>
    <script src="./assets/main.js"></script>
  </body>
</html>
