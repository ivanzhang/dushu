name: Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  deployments: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      # Astro 6 要求 Node.js >= 22.12，这里固定到 24 避免 runner 默认版本过低。
      - uses: actions/setup-node@v5
        with:
          node-version: 24

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build site
        run: bun run build

      - name: Run tests
        run: bun run test

      - name: Build verification
        run: bun run build:verify

      # 站点当前托管在 Cloudflare Pages，而不是 Workers Static Assets。
      - name: Deploy to Cloudflare Pages
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        # 直接调用 Wrangler CLI，避开仍以 Node 20 为目标运行时的第三方 action。
        run: npx wrangler@4.81.1 pages deploy dist --project-name=dushumy
