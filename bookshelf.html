<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>墨潮小说 - 我的书架</title>
    <link rel="stylesheet" href="./assets/styles.css" />
  </head>
  <body data-page="bookshelf">
    <header class="topbar">
      <div class="container topbar-inner">
        <a class="brand" href="./index.html">
          <span class="brand-badge">墨</span>
          <span>墨潮小说</span>
        </a>
        <button class="nav-toggle" type="button" aria-label="打开菜单">☰</button>
        <nav>
          <ul class="nav-list">
            <li><a class="nav-link" data-page="home" href="./index.html">首页</a></li>
            <li><a class="nav-link" data-page="category" href="./category.html">分类</a></li>
            <li><a class="nav-link" data-page="book" href="./book.html">书籍详情</a></li>
            <li><a class="nav-link" data-page="reader" href="./reader.html">在线阅读</a></li>
            <li><a class="nav-link" data-page="bookshelf" href="./bookshelf.html">我的书架</a></li>
            <li><a class="nav-link" data-page="login" href="./login.html">登录</a></li>
          </ul>
        </nav>
      </div>
    </header>

    <main class="container">
      <section class="section two-col">
        <div>
          <div class="section-head">
            <div>
              <h1 class="section-title">我的书架</h1>
              <p class="section-sub">继续阅读、查看更新、快速管理收藏作品。</p>
            </div>
            <a class="btn btn-secondary" href="./category.html">去找新书</a>
          </div>
          <div id="bookshelf-list"></div>
        </div>

        <aside class="panel reveal">
          <div class="panel-head">
            <strong>阅读日历</strong>
          </div>
          <div class="panel-body" style="display:grid; gap:12px;">
            <div id="bookshelf-membership" class="notice"></div>
            <div class="notice">连续阅读 12 天，已超过 87% 读者。</div>
            <div class="notice">本周阅读时长 6 小时 34 分钟。</div>
            <div class="notice">书架更新提醒：3 本有新章节。</div>
            <button class="btn btn-primary">开启更新推送</button>
          </div>
        </aside>
      </section>
    </main>

    <footer>
      <div class="container">书架页模板支持分组、置顶、批量管理扩展。</div>
    </footer>

    <script src="./assets/mock-data.js"></script>
    <script src="./assets/main.js"></script>
  </body>
</html>
